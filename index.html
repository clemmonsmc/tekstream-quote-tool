<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TekStream Quote Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#13110F;font-size:14px}
.hdr{background:#003658;display:flex;align-items:center;padding:0 24px;height:68px;gap:16px;position:relative}
.hdr::after{content:'';position:absolute;left:0;right:0;top:68px;height:5px;background:#5B94CB}
.hdr-logo{height:46px}.hdr-tag{color:rgba(255,255,255,.65);font-size:13px;letter-spacing:.08em;text-transform:uppercase;flex:1;text-align:center}
.btn{background:#003658;color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600}.btn:hover{background:#004f7a}
.btn-sm{padding:6px 12px;font-size:12px}
.layout{display:grid;grid-template-columns:320px 1fr;gap:20px;padding:28px 24px;max-width:1400px;margin:0 auto}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.section-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#5B94CB;margin-bottom:12px}
.field{margin-bottom:14px}.field label{display:block;font-size:12px;color:#717174;margin-bottom:4px}
.field input,.field textarea{width:100%;border:1.5px solid #e2e8f0;border-radius:6px;padding:7px 10px;font-size:13px;color:#13110F;background:#fff;outline:none;transition:border-color .15s}
.field input:focus,.field textarea:focus{border-color:#5B94CB}.field textarea{resize:vertical;min-height:72px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.upload-row{display:flex;align-items:center;gap:10px}.upload-status{font-size:12px;color:#717174}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#003658;color:#fff;padding:9px 8px;text-align:left;font-weight:600;font-size:11px}
td{padding:5px 3px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
tr:nth-child(even) td{background:#EBF3FB}
td input{border:1.5px solid #e2e8f0;border-radius:4px;padding:4px 5px;font-size:12px;width:100%;background:#fff}
td input:focus{border-color:#5B94CB;outline:none}td input[type=date]{font-size:11px}
.del{background:none;border:none;color:#c00;cursor:pointer;font-size:14px;padding:2px 6px}
.muted{color:#717174;font-size:12px}
.trow{display:flex;justify-content:flex-end;gap:40px;padding:3px 0;font-size:13px}
.trow.grand{font-size:16px;font-weight:700;color:#003658}
.empty{color:#717174;text-align:center;padding:40px;font-size:13px}
.btn-row{display:flex;gap:10px;margin-top:16px}.dl-btn{flex:1;padding:13px;font-size:15px;border-radius:8px}
</style>
</head>

  <span class="hdr-tag">VAD Quote Generator</span>
  <button class="btn" style="border:1.5px solid rgba(255,255,255,.4);background:transparent" onclick="newQuote()">New Quote</button>
</div>
<div class="layout">
  <div class="card">
    <div class="section-label">Quote Details</div>
    <div class="field"><label>Customer / company</label><input id="customerName" autocomplete="off" placeholder="ACME Corp"></div>
    <div class="field"><label>Contact name</label><input id="contactName" autocomplete="off"></div>
    <div class="field"><label>Contact email</label><input id="contactEmail" autocomplete="off"></div>
    <div class="field"><label>Quote number</label><input id="quoteNumber" autocomplete="off"></div>
    <div class="field-row">
      <div class="field"><label>Quote date</label><input id="quoteDate" type="date"></div>
      <div class="field"><label>Expiration date</label><input id="expiryDate" type="date" oninput="this.style.borderColor=this.value?'':'#e53e3e'"></div>
    </div>
    <div class="field">
      <label>Margin %</label>
      <input id="marginPct" type="number" value="15" min="0" max="99" step="0.5" autocomplete="off" oninput="recalcAll()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:3px">
        <span id="marginHint" style="font-size:11px;color:#717174">15% margin applied</span>
        <span id="marginDollar" style="font-size:11px;font-weight:600;color:#003658"></span>
      </div>
    </div>
    <div class="field">
      <label>VAD Quote (PDF or Excel)</label>
      <input type="file" id="vadPdf" accept=".pdf,.xlsx,.xls" style="display:none" onchange="extractVAD(this)">
      <div class="upload-row">
        <button class="btn" onclick="document.getElementById('vadPdf').click()">Upload VAD Quote</button>
        <span id="extractStatus" class="upload-status">No file selected</span>
      </div>
    </div>
    <div class="field"><label>Personalized note</label><textarea id="notes" autocomplete="off" placeholder="Thank you for the opportunity..."></textarea></div>
    <div class="field"><label>Payment terms</label><input id="terms" autocomplete="off" value="Net 30"></div>
    <div class="field"><label>Prepared by — company</label><input id="preparedByCompany" autocomplete="off" value="TekStream Solutions"></div>
    <div class="field"><label>Prepared by — name</label><input id="preparedBy" autocomplete="off"></div>
    <div class="field"><label>Prepared by — email</label><input id="preparedByEmail" autocomplete="off"></div>
  </div>
  <div class="card">
    <div class="section-label" style="margin-bottom:14px">Line Items</div>
    <div id="liArea"><div class="empty">Add line items manually or upload a VAD quote.</div></div>
    <div id="totals"></div>
    <div style="margin-top:10px"><button class="btn btn-sm" style="background:transparent;border:1.5px solid #003658;color:#003658" onclick="addRow()">+ Add line item</button></div>
    <div class="btn-row">
      <button class="btn dl-btn" onclick="downloadPdf()">Download PDF quote ↓</button>
      <button class="btn dl-btn" style="background:#5B94CB" onclick="emailQuote()">Email Quote ✉</button>
    </div>
  </div>
</div>
<script>
window.lineItems = [];

(function init() {
  var today = new Date().toISOString().split('T')[0];
  var exp = new Date(Date.now() + 30 * 864e5).toISOString().split('T')[0];
  document.getElementById('quoteDate').value = today;
  document.getElementById('expiryDate').value = exp;
  document.getElementById('quoteNumber').value = 'TS-' + new Date().getFullYear() + '-' + (Math.floor(Math.random() * 900) + 100);
})();

function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function cprice(vad,m){return(!vad||vad<=0||m>=100)?0:vad/(1-m/100);}
function fmt(n){return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

function addRow(){window.lineItems.push({sku:'',description:'',qty:1,unit_price:0,start_date:'',end_date:''});render();}
function removeRow(i){window.lineItems.splice(i,1);render();}

function render(){
  var m=parseFloat(document.getElementById('marginPct').value)||0;
  var area=document.getElementById('liArea');
  if(!window.lineItems.length){area.innerHTML='<div class="empty">Add line items manually or upload a VAD quote.</div>';document.getElementById('totals').innerHTML='';updateMarginDollar(m,0,0);return;}
  var h='<table><colgroup><col style="width:11%"><col style="width:28%"><col style="width:6%"><col style="width:10%"><col style="width:9%"><col style="width:9%"><col style="width:22%"><col style="width:5%"></colgroup><thead><tr><th>SKU</th><th>Description</th><th>Qty</th><th>VAD Price</th><th>Start</th><th>End</th><th>Customer</th><th></th></tr></thead><tbody>';
  window.lineItems.forEach(function(it,i){
    var cp=cprice(it.unit_price,m),ext=cp*it.qty;
    h+='<tr><td><input value="'+escH(it.sku)+'" oninput="lineItems['+i+'].sku=this.value" autocomplete="off"></td>';
    h+='<td><input value="'+escH(it.description)+'" oninput="lineItems['+i+'].description=this.value" autocomplete="off"></td>';
    h+='<td><input type="number" value="'+it.qty+'" min="1" style="width:50px" oninput="lineItems['+i+'].qty=+this.value;recalcAll()" autocomplete="off"></td>';
    h+='<td><input type="number" value="'+it.unit_price.toFixed(2)+'" step="0.01" min="0" oninput="lineItems['+i+'].unit_price=+this.value;recalcAll()" autocomplete="off"></td>';
    h+='<td><input type="date" value="'+escH(it.start_date||'')+'" style="width:105px" oninput="lineItems['+i+'].start_date=this.value"></td>';
    h+='<td><input type="date" value="'+escH(it.end_date||'')+'" style="width:105px" oninput="lineItems['+i+'].end_date=this.value"></td>';
    h+='<td class="muted">'+(ext>0?'$'+fmt(ext):'—')+'</td>';
    h+='<td><button class="del" onclick="removeRow('+i+')">✕</button></td></tr>';
  });
  area.innerHTML=h+'</tbody></table>';
  var vadTotal=window.lineItems.reduce(function(s,it){return s+it.unit_price*it.qty;},0);
  var sub=window.lineItems.reduce(function(s,it){return s+cprice(it.unit_price,m)*it.qty;},0);
  document.getElementById('totals').innerHTML='<div class="trow"><span>Subtotal</span><span>$'+fmt(sub)+'</span></div><div class="trow grand"><span>Total (USD)</span><span>$'+fmt(sub)+'</span></div>';
  updateMarginDollar(m,sub,vadTotal);
}

function updateMarginDollar(m,custTotal,vadTotal){
  var el=document.getElementById('marginDollar');
  if(el)el.textContent=(m>0&&custTotal>vadTotal)?'$'+fmt(custTotal-vadTotal):'';
}

function recalcAll(){
  var m=parseFloat(document.getElementById('marginPct').value)||0;
  document.getElementById('marginHint').textContent=m>0?m+'% margin applied':'';
  render();
}

function newQuote(){
  ['customerName','contactName','contactEmail','notes','preparedBy','preparedByEmail'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('preparedByCompany').value='TekStream Solutions';
  document.getElementById('terms').value='Net 30';
  document.getElementById('marginPct').value='15';
  document.getElementById('marginHint').textContent='15% margin applied';
  document.getElementById('marginDollar').textContent='';
  document.getElementById('quoteNumber').value='TS-'+new Date().getFullYear()+'-'+(Math.floor(Math.random()*900)+100);
  var today=new Date().toISOString().split('T')[0],exp=new Date(Date.now()+30*864e5).toISOString().split('T')[0];
  document.getElementById('quoteDate').value=today;document.getElementById('expiryDate').value=exp;
  document.getElementById('expiryDate').style.borderColor='';
  window.lineItems=[];render();
  document.getElementById('extractStatus').textContent='No file selected';
  document.getElementById('vadPdf').value='';
}

async function extractVAD(input){
  var file=input.files[0];if(!file)return;
  document.getElementById('extractStatus').textContent='Extracting…';
  try{
    var b64=await new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){res(e.target.result.split(',')[1]);};r.onerror=rej;r.readAsDataURL(file);});
    var resp=await fetch('/api/extract',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fileBase64:b64,fileType:file.type,fileName:file.name})});
    if(!resp.ok){var e=await resp.json();throw new Error(e.error||resp.status);}
    var parsed=await resp.json();
    if(parsed.to)document.getElementById('preparedByCompany').value=parsed.to.company||'';
    if(parsed.for){document.getElementById('customerName').value=parsed.for.company||'';document.getElementById('contactName').value=parsed.for.name||'';document.getElementById('contactEmail').value=parsed.for.email||'';}
    if(parsed.quote_expire_date){document.getElementById('expiryDate').value=parsed.quote_expire_date;document.getElementById('expiryDate').style.borderColor='';}
    else{document.getElementById('expiryDate').value='';document.getElementById('expiryDate').style.borderColor='#e53e3e';}
    if(parsed.lineItems&&parsed.lineItems.length)window.loadLineItems(parsed.lineItems);
    document.getElementById('extractStatus').textContent='✓ Extracted '+(parsed.lineItems&&parsed.lineItems.length||0)+' line items'+(parsed.vad?' ('+parsed.vad+')':'');
  }catch(e){document.getElementById('extractStatus').textContent='Error: '+e.message;}
}

window.loadLineItems=function(items){
  window.lineItems=items.map(function(it){return{sku:String(it.sku||''),description:String(it.description||''),qty:parseFloat(it.qty)||1,unit_price:parseFloat(String(it.unit_price||'0').replace(/[$,]/g,''))||0,start_date:String(it.start_date||''),end_date:String(it.end_date||'')};});
  render();
};

async function emailQuote(){
  await downloadPdf();
  var cn=document.getElementById('customerName').value||'Customer';
  var co=document.getElementById('contactName').value||'';
  var ce=document.getElementById('contactEmail').value||'';
  var qn=document.getElementById('quoteNumber').value||'TS-QUOTE';
  var ed=document.getElementById('expiryDate').value||'';
  var nt=document.getElementById('notes').value||'';
  var body=(co?'Hi '+co.split(' ')[0]+',':'Hi,')+'

Please find attached our quote '+qn+' for '+cn+(ed?' valid through '+ed:'')+'.'

'+(nt?nt+'

':'')+"Please don't hesitate to reach out with any questions. We look forward to the opportunity to work with you.";
  window.location.href='mailto:'+encodeURIComponent(ce)+'?subject='+encodeURIComponent('TekStream Quote '+qn+' for '+cn)+'&body='+encodeURIComponent(body);
}

async function downloadPdf(){
  var jsPDF=window.jspdf.jsPDF;
  var m=parseFloat(document.getElementById('marginPct').value)||0;
  var cn=document.getElementById('customerName').value||'Customer';
  var co=document.getElementById('contactName').value||'';
  var ce=document.getElementById('contactEmail').value||'';
  var qn=document.getElementById('quoteNumber').value||'TS-QUOTE';
  var qd=document.getElementById('quoteDate').value;
  var ed=document.getElementById('expiryDate').value;
  var nt=document.getElementById('notes').value;
  var tm=document.getElementById('terms').value||'Net 30';
  var pb=document.getElementById('preparedBy').value||'';
  var pbc=document.getElementById('preparedByCompany').value||'TekStream Solutions';
  var pbe=document.getElementById('preparedByEmail').value||'';
  var logoSrc=document.getElementById('hdrLogo').src;
  var doc=new jsPDF({unit:'pt',format:'letter'});
  var W=612,L=48,R=564;
  doc.setFillColor(0,54,88);doc.rect(0,0,W,68,'F');
  if(logoSrc&&logoSrc.startsWith('data:')){
    try{var li=new Image();await new Promise(function(res,rej){li.onload=res;li.onerror=rej;li.src=logoSrc;});doc.addImage(logoSrc,'PNG',L,11,li.naturalWidth*(46/li.naturalHeight),46);}
    catch(e){doc.setFont('helvetica','bold');doc.setFontSize(18);doc.setTextColor(255,255,255);doc.text('TekStream',L,36);}
  }
  doc.setFillColor(91,148,203);doc.rect(0,68,W,5,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(255,255,255);
  doc.text('Quote #  '+qn,R,28,{align:'right'});doc.setFont('helvetica','normal');doc.text('Date:  '+qd,R,42,{align:'right'});doc.text('Expires:  '+ed,R,56,{align:'right'});
  doc.setFont('helvetica','bold');doc.setFontSize(22);doc.setTextColor(0,54,88);doc.text('Quote',L,108);
  doc.setFillColor(235,243,251);doc.roundedRect(L,118,210,70,3,3,'F');
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(91,148,203);doc.text('PREPARED FOR',L+10,133);
  doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(0,54,88);doc.text(cn,L+10,149);
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(113,113,116);
  if(co)doc.text(co,L+10,161);if(ce)doc.text(ce,L+10,173);
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(91,148,203);doc.text('PREPARED BY',R-200,133);
  doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(0,54,88);doc.text(pbc,R-200,149);
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(113,113,116);
  if(pb)doc.text(pb,R-200,161);if(pbe)doc.text(pbe,R-200,173);
  var y=210;
  if(nt){doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(60,60,60);var lines=doc.splitTextToSize(nt,R-L);doc.text(lines,L,y);y+=lines.length*13+14;}
  var skuW=(R-L)*0.13,dateW=50,qtyW=30,priceW=62,extW=70,descW=(R-L)-skuW-dateW*2-qtyW-priceW-extW-10;
  var colSku=L+4,colDesc=L+skuW+4,colSt=colDesc+descW+2,colEd=colSt+dateW+2,colQty=colEd+dateW+2,colPr=colQty+qtyW+4,colEx=R-4;
  doc.setFillColor(0,54,88);doc.rect(L,y,R-L,20,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(255,255,255);
  doc.text('SKU',colSku,y+14);doc.text('Description',colDesc,y+14);
  doc.text('Start',colSt+dateW,y+14,{align:'right'});doc.text('End',colEd+dateW,y+14,{align:'right'});
  doc.text('Qty',colQty+qtyW,y+14,{align:'right'});doc.text('Unit Price',colPr+priceW,y+14,{align:'right'});doc.text('Extended',colEx,y+14,{align:'right'});
  y+=20;var subtotal=0;doc.setFont('helvetica','normal');
  window.lineItems.forEach(function(it,idx){
    var cp=cprice(it.unit_price,m),ext=cp*it.qty;subtotal+=ext;
    var skuL=doc.splitTextToSize(it.sku||'',skuW-4),descL=doc.splitTextToSize(it.description||'',descW-4);
    var nL=Math.max(skuL.length,descL.length,1),rowH=nL*11+10;
    if(idx%2===1){doc.setFillColor(235,243,251);doc.rect(L,y,R-L,rowH,'F');}
    doc.setTextColor(19,17,18);doc.setFontSize(8.5);doc.text(skuL,colSku,y+9);doc.text(descL,colDesc,y+9);
    var mid=y+rowH/2+3;
    if(it.start_date)doc.text(it.start_date,colSt+dateW,mid,{align:'right'});
    if(it.end_date)doc.text(it.end_date,colEd+dateW,mid,{align:'right'});
    doc.text(it.qty.toLocaleString(),colQty+qtyW,mid,{align:'right'});
    doc.text(cp>0?'$'+fmt(cp):'—',colPr+priceW,mid,{align:'right'});
    doc.text(ext>0?'$'+fmt(ext):'—',colEx,mid,{align:'right'});
    y+=rowH;
  });
  y+=6;doc.setDrawColor(91,148,203);doc.setLineWidth(0.5);doc.line(R-190,y,R,y);y+=14;
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(0,54,88);
  doc.text('Total (USD)',R-186,y);doc.text('$'+fmt(subtotal),R-4,y,{align:'right'});
  y+=28;doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(113,113,116);
  doc.text('Payment terms: '+tm,L,y);y+=12;
  doc.text('This quote is valid through the expiration date above. All prices are in USD.',L,y);y+=12;
  doc.text('Quote subject to change without notice.',L,y);
  doc.setFillColor(0,54,88);doc.rect(0,748,W,6,'F');doc.setFillColor(91,148,203);doc.rect(0,754,W,14,'F');
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(255,255,255);
  doc.text('Copyright © TekStream Solutions, LLC 2026 | tekstream.com | Confidential',W/2,763,{align:'center'});
  doc.save(qn+' - '+cn+'.pdf');
}
</script>
