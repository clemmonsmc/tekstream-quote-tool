<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TekStream Quote Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#13110F;font-size:14px}
.hdr{background:#003658;display:flex;align-items:center;padding:0 24px;height:68px;gap:16px;position:relative}
.hdr::after{content:'';position:absolute;left:0;right:0;top:68px;height:5px;background:#5B94CB}
.hdr-logo{height:46px}.hdr-tag{color:rgba(255,255,255,.65);font-size:13px;letter-spacing:.08em;text-transform:uppercase;flex:1;text-align:center}
.btn{background:#003658;color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600}.btn:hover{background:#004f7a}
.btn-sm{padding:6px 12px;font-size:12px}
.wrap{max-width:1400px;margin:0 auto;padding:20px 24px 0}
.rep-card{background:#fff;border-radius:10px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px}
.layout{padding:12px 24px 28px;max-width:1400px;margin:0 auto}
.left-col{margin-bottom:12px}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.section-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#5B94CB;margin-bottom:12px}
.field{margin-bottom:14px}.field label{display:block;font-size:12px;color:#717174;margin-bottom:4px}
.field input,.field textarea{width:100%;border:1.5px solid #e2e8f0;border-radius:6px;padding:7px 10px;font-size:13px;color:#13110F;background:#fff;outline:none;transition:border-color .15s}
.field input:focus,.field textarea:focus{border-color:#5B94CB}.field textarea{resize:vertical;min-height:72px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.upload-row{display:flex;align-items:center;gap:10px}.upload-status{font-size:12px;color:#717174}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#003658;color:#fff;padding:9px 8px;text-align:left;font-weight:600;font-size:11px}
td{padding:5px 3px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
tr:nth-child(even) td{background:#EBF3FB}
td input{border:1.5px solid #e2e8f0;border-radius:4px;padding:4px 5px;font-size:12px;width:100%;background:#fff}
td input:focus{border-color:#5B94CB;outline:none}td input[type=date]{font-size:11px}
td input.cust-price::-webkit-inner-spin-button,td input.cust-price::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
td input.cust-price{-moz-appearance:textfield}
.del{background:none;border:none;color:#c00;cursor:pointer;font-size:14px;padding:2px 6px}
.muted{color:#717174;font-size:12px}
.trow{display:flex;justify-content:flex-end;gap:40px;padding:3px 0;font-size:13px}
.trow.grand{font-size:16px;font-weight:700;color:#003658}
.empty{color:#717174;text-align:center;padding:40px;font-size:13px}
.btn-row{display:flex;gap:10px;margin-top:16px}.dl-btn{flex:1;padding:13px;font-size:15px;border-radius:8px}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100}
.drawer-overlay.open{display:block}
.drawer{position:fixed;left:0;top:0;bottom:0;width:340px;background:#fff;box-shadow:4px 0 24px rgba(0,0,0,.18);z-index:101;transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-hdr{background:#003658;color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px}
.drawer-hdr h2{font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;flex:1;margin:0}
.drawer-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:0 4px}
.drawer-body{flex:1;overflow-y:auto;padding:16px}
.quote-details-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 120px 120px 110px;gap:10px 14px;align-items:start}
.quote-details-grid .field{margin:0}
.saved-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f2f5;cursor:pointer}
.saved-item:last-child{border-bottom:none}
.saved-item:hover .saved-label{color:#5B94CB}
.saved-label{flex:1;font-size:13px;color:#13110F}
.saved-meta{font-size:11px;color:#717174;white-space:nowrap}
.saved-del{background:none;border:none;color:#c00;cursor:pointer;font-size:16px;padding:2px 6px;flex-shrink:0}
.drag-handle:active{cursor:grabbing}
tr.drag-over td{border-top:2px solid #5B94CB}
</style>
</head>
<body>
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="savedDrawer">
  <div class="drawer-hdr">
    <h2>Saved Quotes</h2>
    <button class="drawer-close" onclick="closeDrawer()">&times;</button>
  </div>
  <div class="drawer-body">
    <div id="savedList"></div>
  </div>
</div>
<div class="hdr">
  <img class="hdr-logo" id="hdrLogo" alt="TekStream">
  <span class="hdr-tag">VAD Quote Generator</span>
  <button class="btn" style="border:1.5px solid rgba(255,255,255,.4);background:transparent" onclick="openDrawer()">Saved Quotes</button>
  <button class="btn" style="border:1.5px solid rgba(255,255,255,.4);background:transparent" onclick="newQuote()">New Quote</button>
</div>
<div class="wrap">
  <div class="rep-card">
    <div class="section-label" style="margin-bottom:10px">Rep Settings</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div class="field" style="margin:0"><label>Your name</label><input id="repName" autocomplete="off" placeholder="Matt Clemmons" oninput="saveRepSettings()"></div>
      <div class="field" style="margin:0"><label>Your email</label><input id="repEmail" autocomplete="off" placeholder="matt@tekstream.com" oninput="saveRepSettings()"></div>
      <div class="field" style="margin:0"><label>TekStream Signer Email</label><input id="signerEmail" autocomplete="off" placeholder="manager@tekstream.com" oninput="saveRepSettings()"></div>
    </div>
  </div>
</div>
<div class="layout">
  <div class="left-col">
    <div class="card">
      <div class="section-label" style="margin-bottom:10px">Quote Details</div>
      <div style="display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 120px 120px 110px;gap:10px 14px;align-items:start;margin-bottom:10px">
        <div class="field" style="margin:0"><label>Customer / company</label><input id="customerName" autocomplete="off" placeholder="ACME Corp"></div>
        <div class="field" style="margin:0"><label>Contact name</label><input id="contactName" autocomplete="off"></div>
        <div class="field" style="margin:0"><label>Contact email</label><input id="contactEmail" autocomplete="off"></div>
        <div class="field" style="margin:0"><label>Quote number</label><input id="quoteNumber" autocomplete="off"></div>
        <div class="field" style="margin:0"><label>Quote date</label><input id="quoteDate" type="date"></div>
        <div class="field" style="margin:0"><label>Expiration date</label><input id="expiryDate" type="date" oninput="this.style.borderColor=this.value?'':\'#e53e3e\'"></div>
        <div class="field" style="margin:0">
          <label>Margin %</label>
          <input id="marginPct" type="number" value="15" min="0" max="99" step="0.125" autocomplete="off" oninput="recalcAll()">
          <div style="display:flex;justify-content:space-between;margin-top:2px">
            <span id="marginHint" style="font-size:10px;color:#717174">15% applied</span>
            <span id="marginDollar" style="font-size:10px;font-weight:600;color:#003658"></span>
          </div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:auto 1fr 160px;gap:10px 14px;align-items:start">
        <div class="field" style="margin:0">
          <label>VAD Quote (PDF or Excel)</label>
          <input type="file" id="vadPdf" accept=".pdf,.xlsx,.xls" style="display:none" onchange="extractVAD(this)">
          <div class="upload-row">
            <button class="btn" onclick="document.getElementById('vadPdf').click()">Upload VAD Quote</button>
            <span id="extractStatus" class="upload-status">No file selected</span>
          </div>
        </div>
        <div class="field" style="margin:0"><label>Personalized note</label><textarea id="notes" autocomplete="off" placeholder="Thank you for the opportunity..." style="min-height:52px"></textarea></div>
        <div class="field" style="margin:0"><label>Payment terms</label><input id="terms" autocomplete="off" value="Net 30"></div>
      </div>
      <input type="hidden" id="preparedBy"><input type="hidden" id="preparedByCompany" value="TekStream"><input type="hidden" id="signerEmailHidden">
      <input type="hidden" id="preparedByEmail">
    </div>

  </div>
</div>
<div style="padding:0 24px 28px;max-width:1400px;margin:0 auto">
  <div class="card">
    <div class="section-label" style="margin-bottom:14px">Line Items</div>
    <div id="liArea"><div class="empty">Add line items manually or upload a VAD quote.</div></div>
    <div id="totals"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:8px;justify-content:flex-end">
      <label style="font-size:12px;color:#717174;white-space:nowrap">Set total:</label>
      <input id="setTotalInput" type="number" min="0" step="0.01" autocomplete="off"
        placeholder="e.g. 84055.12"
        style="width:130px;border:1.5px solid #e2e8f0;border-radius:6px;padding:5px 8px;font-size:13px;outline:none"
        onfocus="this.style.borderColor='#5B94CB'"
        onblur="this.style.borderColor='#e2e8f0'"
        onkeydown="if(event.key==='Enter')applySetTotal()">
      <button class="btn btn-sm" style="background:#5B94CB" onclick="applySetTotal()">Apply</button>
    </div>
    <div style="margin-top:10px"><button class="btn btn-sm" style="background:transparent;border:1.5px solid #003658;color:#003658" onclick="addRow()">+ Add line item</button></div>
    <div class="btn-row">
      <button class="btn dl-btn" onclick="downloadPdf()">Download PDF quote &#8595;</button>
      <button class="btn dl-btn" style="background:#717174" onclick="previewPdf()">Preview PDF &#128269;</button>
      <button class="btn dl-btn" style="background:#5B94CB" onclick="emailQuote()">Email Quote &#9993;</button>
      <button class="btn dl-btn" style="background:#2d7a4f" id="signBtn" onclick="sendForSignature()">Send for Signature &#9998;</button>
    </div>
    <p style="font-size:11px;color:#717174;margin-top:8px;text-align:center">Email Quote downloads the PDF &#8212; attach it to the Outlook email before sending.</p>
  </div>
</div>
<script>
window.lineItems = [];
window.logoDataUrl = null;

(function init() {
  fetch('/api/logo').then(function(r){return r.arrayBuffer();}).then(function(buf){
    var b=new Uint8Array(buf),s='';b.forEach(function(x){s+=String.fromCharCode(x);});
    window.logoDataUrl='data:image/png;base64,'+btoa(s);
    document.getElementById('hdrLogo').src=window.logoDataUrl;
  }).catch(function(){});
  var today=new Date().toISOString().split('T')[0];
  var exp=new Date(Date.now()+30*864e5).toISOString().split('T')[0];
  document.getElementById('quoteDate').value=today;
  document.getElementById('expiryDate').value=exp;
  document.getElementById('quoteNumber').value='TS-'+new Date().getFullYear()+'-'+(Math.floor(Math.random()*900)+100);
  loadRepSettings();
  renderSavedQuotes();
  // Auto-save on any form field change
  document.querySelector('.left-col .card').addEventListener('input', function(){ autoSave(); });
})();

function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function cprice(vad,m){return(!vad||vad<=0||m>=100)?0:vad/(1-m/100);}
function fmt(n){return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function effectiveMargin(it,globalM){return(it.margin!==null&&it.margin!==undefined&&it.margin!=='')? parseFloat(it.margin):globalM;}
function itemCprice(it,globalM){return cprice(it.unit_price,effectiveMargin(it,globalM));}

// ── Auto-save ─────────────────────────────────────────────────────────────
var _autoSaveTimer = null;
function autoSave() {
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(function() {
    var state = getQuoteState();
    var key = state.quoteNumber || ('q' + Date.now());
    var saved = JSON.parse(localStorage.getItem('ts_saved_quotes') || '[]');
    saved = saved.filter(function(q){ return q.key !== key; });
    saved.unshift({key: key, quoteNumber: state.quoteNumber, customerName: state.customerName, savedAt: new Date().toLocaleString(), state: state});
    if (saved.length > 20) saved = saved.slice(0, 20);
    localStorage.setItem('ts_saved_quotes', JSON.stringify(saved));
    renderSavedQuotes();
  }, 2000);
}


function openDrawer(){
  document.getElementById('savedDrawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
  renderSavedQuotes();
}
function closeDrawer(){
  document.getElementById('savedDrawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}
function saveRepSettings(){
  var name=document.getElementById('repName').value;
  var email=document.getElementById('repEmail').value;
  var signer=document.getElementById('signerEmail').value;
  localStorage.setItem('ts_rep_name',name);
  localStorage.setItem('ts_rep_email',email);
  localStorage.setItem('ts_signer_email',signer);
  document.getElementById('preparedBy').value=name;
  document.getElementById('preparedByEmail').value=email;
  document.getElementById('signerEmailHidden').value=signer;
}
function loadRepSettings(){
  var name=localStorage.getItem('ts_rep_name')||'';
  var email=localStorage.getItem('ts_rep_email')||'';
  var signer=localStorage.getItem('ts_signer_email')||'';
  if(name){document.getElementById('repName').value=name;document.getElementById('preparedBy').value=name;}
  if(email){document.getElementById('repEmail').value=email;document.getElementById('preparedByEmail').value=email;}
  if(signer){document.getElementById('signerEmail').value=signer;document.getElementById('signerEmailHidden').value=signer;}
}

function getQuoteState(){
  return{customerName:document.getElementById('customerName').value,contactName:document.getElementById('contactName').value,contactEmail:document.getElementById('contactEmail').value,quoteNumber:document.getElementById('quoteNumber').value,quoteDate:document.getElementById('quoteDate').value,expiryDate:document.getElementById('expiryDate').value,marginPct:document.getElementById('marginPct').value,notes:document.getElementById('notes').value,terms:document.getElementById('terms').value,preparedByCompany:document.getElementById('preparedByCompany').value,preparedBy:document.getElementById('preparedBy').value,preparedByEmail:document.getElementById('preparedByEmail').value,lineItems:JSON.parse(JSON.stringify(window.lineItems))};
}
function restoreQuoteState(s){
  document.getElementById('customerName').value=s.customerName||'';
  document.getElementById('contactName').value=s.contactName||'';
  document.getElementById('contactEmail').value=s.contactEmail||'';
  document.getElementById('quoteNumber').value=s.quoteNumber||'';
  document.getElementById('quoteDate').value=s.quoteDate||'';
  document.getElementById('expiryDate').value=s.expiryDate||'';
  document.getElementById('expiryDate').style.borderColor=s.expiryDate?'':'#e53e3e';
  document.getElementById('marginPct').value=s.marginPct||'15';
  document.getElementById('marginHint').textContent=(s.marginPct||'15')+'% margin applied';
  document.getElementById('notes').value=s.notes||'';
  document.getElementById('terms').value=s.terms||'Net 30';
  document.getElementById('preparedByCompany').value=s.preparedByCompany||'TekStream';
  document.getElementById('preparedBy').value=s.preparedBy||'';
  document.getElementById('preparedByEmail').value=s.preparedByEmail||'';
  window.lineItems=s.lineItems||[];render();
  // Always re-apply rep settings so name/email are never overwritten by saved state
  loadRepSettings();
}
function saveQuote(){
  var state=getQuoteState();
  var key=state.quoteNumber||('q'+Date.now());
  var saved=JSON.parse(localStorage.getItem('ts_saved_quotes')||'[]');
  saved=saved.filter(function(q){return q.key!==key;});
  saved.unshift({key:key,quoteNumber:state.quoteNumber,customerName:state.customerName,savedAt:new Date().toLocaleString(),state:state});
  if(saved.length>20)saved=saved.slice(0,20);
  localStorage.setItem('ts_saved_quotes',JSON.stringify(saved));
  renderSavedQuotes();
  var btn=event.target,orig=btn.textContent;
  btn.textContent='✓ Saved';setTimeout(function(){btn.textContent=orig;},1500);
}
function loadQuote(key){
  var saved=JSON.parse(localStorage.getItem('ts_saved_quotes')||'[]');
  var entry=saved.find(function(q){return q.key===key;});
  if(entry)restoreQuoteState(entry.state);
}
function deleteSavedQuote(key){
  var saved=JSON.parse(localStorage.getItem('ts_saved_quotes')||'[]');
  saved=saved.filter(function(q){return q.key!==key;});
  localStorage.setItem('ts_saved_quotes',JSON.stringify(saved));
  renderSavedQuotes();
}
function renderSavedQuotes(){
  var saved=JSON.parse(localStorage.getItem('ts_saved_quotes')||'[]');
  var card=null;
  var list=document.getElementById('savedList');
  if(!saved.length){list.innerHTML='<div style="color:#717174;font-size:13px;text-align:center;padding:20px">No saved quotes yet.</div>';return;}

  list.innerHTML='';
  saved.forEach(function(q,i){
    var row=document.createElement('div');
    row.className='saved-item';
    var lbl=document.createElement('div');
    lbl.className='saved-label';
    lbl.textContent=(q.quoteNumber||q.key)+(q.customerName?' — '+q.customerName:'');
    var meta=document.createElement('div');
    meta.className='saved-meta';
    meta.textContent=q.savedAt||'';
    var del=document.createElement('button');
    del.className='saved-del';
    del.innerHTML='&times;';
    del.onclick=function(e){
      e.stopPropagation();
      var sv=JSON.parse(localStorage.getItem('ts_saved_quotes')||'[]');
      sv.splice(i,1);
      localStorage.setItem('ts_saved_quotes',JSON.stringify(sv));
      renderSavedQuotes();
    };
    row.onclick=function(){
      var sv=JSON.parse(localStorage.getItem('ts_saved_quotes')||'[]');
      if(sv[i])restoreQuoteState(sv[i].state);
    };
    row.appendChild(lbl);row.appendChild(meta);row.appendChild(del);
    list.appendChild(row);
  });
}
function addRow(){window.lineItems.push({sku:'',description:'',qty:1,unit_price:0,start_date:'',end_date:'',margin:null});render();}
function removeRow(i){window.lineItems.splice(i,1);render();}

function groupByYear(items){
  var years=[],groups={};
  items.forEach(function(it){var yr=it.start_date?it.start_date.substring(0,4):'__none__';if(!groups[yr]){groups[yr]=[];years.push(yr);}groups[yr].push(it);});
  var real=years.filter(function(y){return y!=='__none__';});
  if(real.length<=1)return null;
  years.sort(function(a,b){return a==='__none__'?1:b==='__none__'?-1:a.localeCompare(b);});
  return years.map(function(yr,i){return{label:yr==='__none__'?'Other':'Payment '+(i+1)+' ('+yr+')',items:groups[yr]};});
}

function moveRow(i,dir){
  var j=i+dir;
  if(j<0||j>=window.lineItems.length)return;
  var tmp=window.lineItems[i];window.lineItems[i]=window.lineItems[j];window.lineItems[j]=tmp;
  render();
}
function initDragDrop(){
  var area=document.getElementById('liArea');
  var dragIdx=null;
  area.addEventListener('dragstart',function(e){
    var handle=e.target.closest('.drag-handle');
    if(!handle)return;
    dragIdx=parseInt(handle.getAttribute('data-idx'));
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',dragIdx);
  });
  area.addEventListener('dragover',function(e){
    e.preventDefault();
    e.dataTransfer.dropEffect='move';
    var row=e.target.closest('tr');
    area.querySelectorAll('tr.drag-over').forEach(function(r){r.classList.remove('drag-over');});
    if(row)row.classList.add('drag-over');
  });
  area.addEventListener('dragleave',function(e){
    if(!e.relatedTarget||!area.contains(e.relatedTarget)){
      area.querySelectorAll('tr.drag-over').forEach(function(r){r.classList.remove('drag-over');});
    }
  });
  area.addEventListener('drop',function(e){
    e.preventDefault();
    area.querySelectorAll('tr.drag-over').forEach(function(r){r.classList.remove('drag-over');});
    var row=e.target.closest('tr[data-row]');
    if(!row||dragIdx===null)return;
    var dropIdx=parseInt(row.getAttribute('data-row'));
    if(dropIdx===dragIdx)return;
    var item=window.lineItems.splice(dragIdx,1)[0];
    window.lineItems.splice(dropIdx,0,item);
    dragIdx=null;
    render();
  });
}
function renderRow(it,i,m){
  var em=effectiveMargin(it,m);
  var cp=cprice(it.unit_price,em),ext=cp*it.qty,h='<tr data-row="'+i+'">';
  h+='<td style="text-align:center;padding:2px"><span class="drag-handle" draggable="true" data-idx="'+i+'" title="Drag to reorder" style="cursor:grab;color:#ccc;font-size:14px;user-select:none">&#8942;</span></td>';
  h+='<td><input value="'+escH(it.sku)+'" oninput="lineItems['+i+'].sku=this.value" autocomplete="off"></td>';
  h+='<td><input value="'+escH(it.description)+'" oninput="lineItems['+i+'].description=this.value" autocomplete="off"></td>';
  h+='<td><input type="number" value="'+it.qty+'" min="1" style="width:50px" oninput="lineItems['+i+'].qty=+this.value;recalcAll()" autocomplete="off"></td>';
  h+='<td><input type="number" value="'+it.unit_price.toFixed(2)+'" step="0.01" min="0" oninput="lineItems['+i+'].unit_price=+this.value;recalcAll()" autocomplete="off"></td>';
  var mval=(it.margin!==null&&it.margin!==undefined&&it.margin!=='')?it.margin:'';
  h+='<td><input type="number" value="'+mval+'" min="0" max="99" step="0.125" placeholder="'+m+'" style="width:52px" title="Line margin override" onkeydown="if((event.key===\'ArrowUp\'||event.key===\'ArrowDown\')&&this.value===\'\'){this.value=+this.placeholder;}" oninput="lineItems['+i+'].margin=this.value===\'\'?null:+this.value;recalcAll()" autocomplete="off"></td>';
  var marginDollarLine=(cp-it.unit_price)*it.qty;
  h+='<td class="muted" style="text-align:right;padding-right:4px;font-size:11px;color:#2d7a4f">'+(marginDollarLine>0?'$'+fmt(marginDollarLine):'')+'</td>';
  h+='<td><input type="date" value="'+escH(it.start_date||'')+'" style="width:105px" oninput="lineItems['+i+'].start_date=this.value"></td>';
  h+='<td><input type="date" value="'+escH(it.end_date||'')+'" style="width:105px" oninput="lineItems['+i+'].end_date=this.value"></td>';
  var custVal=(ext>0?ext.toFixed(2):'');

function applySetTotal(){
  var target=parseFloat(document.getElementById('setTotalInput').value);
  if(!target||isNaN(target)||target<=0){alert('Please enter a valid target total.');return;}
  var m=parseFloat(document.getElementById('marginPct').value)||0;
  // Calculate current VAD total per line
  var vadTotals=window.lineItems.map(function(it){return it.unit_price*it.qty;});
  var totalVad=vadTotals.reduce(function(s,v){return s+v;},0);
  if(totalVad<=0){alert('Cannot set total: VAD prices are zero.');return;}
  // Distribute target proportionally — each line gets its share of target
  window.lineItems.forEach(function(it,i){
    var proportion=vadTotals[i]/totalVad;
    var lineTarget=proportion*target;
    if(it.qty>0&&it.unit_price>0){
      var lineUnitTarget=lineTarget/it.qty;
      var newMargin=(1-it.unit_price/lineUnitTarget)*100;
      it.margin=Math.round(newMargin*1000000)/1000000;
    }
  });
  document.getElementById('setTotalInput').value='';
  render();
}

function updateTotalsOnly(){
  var m=parseFloat(document.getElementById('marginPct').value)||0;
  var vt=window.lineItems.reduce(function(s,it){return s+it.unit_price*it.qty;},0);
  var sub=window.lineItems.reduce(function(s,it){return s+itemCprice(it,m)*it.qty;},0);

  if(window.lineItems.length) autoSave();
}

async function extractVAD(input){
  var file=input.files[0];if(!file)return;
  document.getElementById('extractStatus').textContent='Extracting\u2026';
  try{
    var b64=await new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){res(e.target.result.split(',')[1]);};r.onerror=rej;r.readAsDataURL(file);});
    var resp=await fetch('/api/extract',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fileBase64:b64,fileType:file.type,fileName:file.name})});
    if(!resp.ok){var e=await resp.json();throw new Error(e.error||resp.status);}
    var parsed=await resp.json();
    if(parsed.to)document.getElementById('preparedByCompany').value=parsed.to.company||'';
    if(parsed.for){document.getElementById('customerName').value=parsed.for.company||'';document.getElementById('contactName').value=parsed.for.name||'';document.getElementById('contactEmail').value=parsed.for.email||'';}
    if(parsed.quote_expire_date){document.getElementById('expiryDate').value=parsed.quote_expire_date;document.getElementById('expiryDate').style.borderColor='';}
    else{document.getElementById('expiryDate').value='';document.getElementById('expiryDate').style.borderColor='#e53e3e';}
    if(parsed.lineItems&&parsed.lineItems.length)window.loadLineItems(parsed.lineItems);
    document.getElementById('extractStatus').textContent='\u2713 Extracted '+(parsed.lineItems&&parsed.lineItems.length||0)+' line items'+(parsed.vad?' ('+parsed.vad+')':'');
  }catch(e){document.getElementById('extractStatus').textContent='Error: '+e.message;}
}
window.loadLineItems=function(items){window.lineItems=items.map(function(it){return{sku:String(it.sku||''),description:String(it.description||''),qty:parseFloat(it.qty)||1,unit_price:parseFloat(String(it.unit_price||'0').replace(/[$,]/g,''))||0,start_date:String(it.start_date||''),end_date:String(it.end_date||''),margin:null};});render();};

async function sendForSignature(){
  var customerEmail=document.getElementById('contactEmail').value;
  var signerEmail=document.getElementById('signerEmailHidden').value;
  if(!customerEmail){alert('Please enter a customer email before sending for signature.');return;}
  if(!signerEmail){alert('Please enter a TekStream Signer Email in Rep Settings before sending for signature.');return;}

  var btn=document.getElementById('signBtn');
  btn.textContent='Sending…';
  btn.disabled=true;

  try{
    // Generate PDF as base64
    var pdfBlob=await generatePdfBlob();
    var b64=await new Promise(function(res,rej){
      var reader=new FileReader();
      reader.onload=function(e){res(e.target.result.split(',')[1]);};
      reader.onerror=rej;
      reader.readAsDataURL(pdfBlob);
    });

    var resp=await fetch('/api/sign',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        pdfBase64:b64,
        quoteNumber:document.getElementById('quoteNumber').value,
        customerName:document.getElementById('customerName').value,
        customerEmail:customerEmail,
        signerEmail:signerEmail
      })
    });
    var data=await resp.json();
    if(!resp.ok)throw new Error(data.error||resp.status);
    btn.textContent='✓ Sent for Signature';
    btn.style.background='#1a5c38';
  }catch(e){
    btn.textContent='Send for Signature ✒';
    btn.disabled=false;
    alert('Error sending for signature: '+e.message);
  }
}
